<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Jerry James Monogram Icon</title>
  <desc id="desc">A circular J monogram with an orbital signal line.</desc>
  <defs>
    <linearGradient id="jj-icon-ring" x1="8" y1="9" x2="55" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D4FF"/>
      <stop offset="0.5" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#8F5CFF"/>
    </linearGradient>
    <linearGradient id="jj-icon-orbit" x1="5" y1="29" x2="59" y2="35" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8F5CFF"/>
      <stop offset="0.46" stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="jj-icon-glow" x="-8" y="-8" width="80" height="80" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.1" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.00 0 0 0 0 0.83 0 0 0 0 1.00 0 0 0 0.3 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <g filter="url(#jj-icon-glow)">
    <circle cx="32" cy="32" r="23.5" fill="#07090C" fill-opacity="0.72" stroke="url(#jj-icon-ring)" stroke-width="2.1"/>
    <circle cx="32" cy="32" r="18.6" stroke="#F8FCFF" stroke-opacity="0.12" stroke-width="0.9"/>
    <path d="M5 32C18.5 27.2 45.5 27.2 59 32" stroke="url(#jj-icon-orbit)" stroke-width="2" stroke-linecap="round"/>
    <path d="M5 32C18.5 36.8 45.5 36.8 59 32" stroke="#8F5CFF" stroke-opacity="0.34" stroke-width="1.1" stroke-linecap="round"/>
    <text x="32" y="45.5" text-anchor="middle" fill="#F8FCFF" font-family="'Cinzel', 'Trajan Pro', Georgia, 'Times New Roman', serif" font-size="39" font-weight="500" letter-spacing="0">J</text>
  </g>
</svg>
