<svg width="260" height="64" viewBox="0 0 260 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Jerry James Game-Tech Nexus Logo</title>
  <desc id="desc">A game-tech hardware badge paired with the Jerry James wordmark.</desc>
  <defs>
    <linearGradient id="nexus-logo-frame-grad" x1="6" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D4FF"/>
      <stop offset="0.48" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#8F5CFF"/>
    </linearGradient>
    <linearGradient id="nexus-logo-core-grad" x1="16" y1="48" x2="48" y2="16" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D4FF"/>
      <stop offset="0.56" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#8F5CFF"/>
    </linearGradient>
    <linearGradient id="nexus-logo-wordmark-grad" x1="145" y1="21" x2="226" y2="43" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#8F5CFF"/>
    </linearGradient>
    <filter id="nexus-logo-glow" x="-5" y="-5" width="74" height="74" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.00 0 0 0 0 0.83 0 0 0 0 1.00 0 0 0 0.2 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect x="3.5" y="3.5" width="57" height="57" rx="14" fill="#07090C" stroke="url(#nexus-logo-frame-grad)" stroke-width="1.4"/>
  <g filter="url(#nexus-logo-glow)">
    <path d="M22 12.5H42L52 22.5V41.5L42 51.5H22L12 41.5V22.5L22 12.5Z" fill="#0A1118" stroke="url(#nexus-logo-frame-grad)" stroke-width="1.8"/>
    <circle cx="32" cy="32" r="18.5" stroke="#14B8A6" stroke-width="1.1" stroke-dasharray="3 4" opacity="0.42"/>
    <path d="M32 16.5V23.5M32 40.5V47.5M16.5 32H23.5M40.5 32H47.5" stroke="#8F5CFF" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>
    <path d="M20 40V35.5H25.5M44 24V28.5H38.5M20 24V28.5H25.5M44 40V35.5H38.5" stroke="#00D4FF" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <circle cx="32" cy="32" r="8.8" fill="#07090C" stroke="url(#nexus-logo-core-grad)" stroke-width="2"/>
    <path d="M28.2 32H35.8M32 28.2V35.8" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="21" cy="21" r="2.4" fill="#00D4FF"/>
    <circle cx="43" cy="21" r="2.4" fill="#14B8A6"/>
    <circle cx="43" cy="43" r="2.4" fill="#8F5CFF"/>
    <circle cx="21" cy="43" r="2.4" fill="#14B8A6"/>
  </g>

  <text x="76" y="42" font-family="Outfit, Geist, Inter, Segoe UI, sans-serif" font-size="28" font-weight="650" letter-spacing="0">
    <tspan fill="#FFFFFF">Jerry </tspan>
    <tspan fill="url(#nexus-logo-wordmark-grad)" font-weight="800">James</tspan>
  </text>
</svg>
