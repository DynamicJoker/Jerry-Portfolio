<svg xmlns="http://www.w3.org/2000/svg" width="260" height="64" fill="none" aria-labelledby="title desc" role="img" viewBox="0 0 260 64">
  <title id="title">Jerry James Monogram Logo</title>
  <desc id="desc">
    A circular J monogram with an orbital signal line paired with the Jerry James wordmark.
  </desc>
  <defs>
    <linearGradient id="jj-logo-ring" x1="10" x2="59" y1="11" y2="55" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="jj-logo-orbit" x1="8" x2="71" y1="29" y2="35" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00d4ff"/>
      <stop offset=".5" stop-color="#73e2f7"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="jj-logo-word" x1="86" x2="247" y1="20" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fcff"/>
      <stop offset=".58" stop-color="#ddf8ff"/>
      <stop offset="1" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="jj-logo-gloss" x1="30" x2="40" y1="14" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#dffaff"/>
      <stop offset=".45" stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#0e8c81"/>
    </linearGradient>
    <filter id="jj-logo-soft-glow" width="90" height="80" x="-8" y="-8" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feGaussianBlur result="blur" stdDeviation="2.1"/>
      <feColorMatrix in="blur" values="0 0 0 0 0.00 0 0 0 0 0.83 0 0 0 0 1.00 0 0 0 0.28 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>
    <filter id="jj-logo-word-glow" width="180" height="42" x="80" y="12" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="0" flood-color="#00d4ff" flood-opacity=".22" stdDeviation="1.6"/>
    </filter>
    <filter id="jj-logo-sig-glow" width="180%" height="180%" x="-40%" y="-40%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" flood-color="#00d4ff" flood-opacity=".65" stdDeviation="1.1"/>
    </filter>
    <mask id="jj-cut" width="70" height="64" x="0" y="0" maskUnits="userSpaceOnUse">
      <path fill="#fff" d="M0 0h70v64H0z"/>
      <path stroke="#000" stroke-linecap="round" stroke-width="3.8" d="M6.5 35.6C21 30.8 50 30.8 67 35.6"/>
    </mask>
  </defs>
  <g filter="url(#jj-logo-soft-glow)">
    <circle cx="35" cy="32" r="23.5" fill="#07090c" fill-opacity=".72" stroke="url(#jj-logo-ring)" stroke-width="2.1"/>
    <circle cx="35" cy="32" r="18.6" stroke="#f8fcff" stroke-opacity=".12" stroke-width=".9"/>
    <path fill="url(#jj-logo-gloss)" d="M41.2 18.07V37.3q0 1.93-.61 3.53-.61 1.59-1.79 2.73-1.17 1.13-2.92 1.75-1.74.62-4.05.62-1.7 0-3.27-.4-1.58-.4-2.76-1.01v-4.99q.53.44 1.23.82.71.37 1.5.66.8.28 1.64.44t1.66.16q.69 0 1.44-.26.74-.25 1.33-.84.59-.58.97-1.54.38-.95.38-2.36V22.33h-9.94v-4.26" mask="url(#jj-cut)"/>
  </g>
  <path stroke="url(#jj-logo-orbit)" stroke-linecap="round" stroke-width="1.7" d="M6.5 35.6C21 30.8 50 30.8 67 35.6" filter="url(#jj-logo-sig-glow)"/>
