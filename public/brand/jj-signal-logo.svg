<svg width="260" height="64" viewBox="0 0 260 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Jerry James Monogram Logo</title>
  <desc id="desc">A circular J monogram with an orbital signal line paired with the Jerry James wordmark.</desc>
  <defs>
    <linearGradient id="jj-logo-ring" x1="10" y1="11" x2="59" y2="55" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D4FF"/>
      <stop offset="0.5" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#8F5CFF"/>
    </linearGradient>
    <linearGradient id="jj-logo-orbit" x1="8" y1="29" x2="71" y2="35" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8F5CFF"/>
      <stop offset="0.46" stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="jj-logo-word" x1="87" y1="19" x2="228" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FCFF"/>
      <stop offset="0.58" stop-color="#DDF8FF"/>
      <stop offset="1" stop-color="#8F5CFF"/>
    </linearGradient>
    <filter id="jj-logo-soft-glow" x="-8" y="-8" width="90" height="80" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.1" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.00 0 0 0 0 0.83 0 0 0 0 1.00 0 0 0 0.28 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>
    <filter id="jj-logo-word-glow" x="80" y="12" width="165" height="42" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="1.6" flood-color="#00D4FF" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#jj-logo-soft-glow)">
    <circle cx="35" cy="32" r="23.5" fill="#07090C" fill-opacity="0.72" stroke="url(#jj-logo-ring)" stroke-width="2.1"/>
    <circle cx="35" cy="32" r="18.6" stroke="#F8FCFF" stroke-opacity="0.12" stroke-width="0.9"/>
    <path d="M6.5 32C21 27.2 50 27.2 67 32" stroke="url(#jj-logo-orbit)" stroke-width="2" stroke-linecap="round"/>
    <path d="M6.5 32C21 36.8 50 36.8 67 32" stroke="#8F5CFF" stroke-opacity="0.34" stroke-width="1.1" stroke-linecap="round"/>
    <text x="35" y="45.5" text-anchor="middle" fill="#F8FCFF" font-family="'Cinzel', 'Trajan Pro', Georgia, 'Times New Roman', serif" font-size="39" font-weight="500" letter-spacing="0">J</text>
  </g>

  <text x="86" y="40" fill="url(#jj-logo-word)" filter="url(#jj-logo-word-glow)" font-family="'Cinzel', 'Trajan Pro', Georgia, 'Times New Roman', serif" font-size="22.5" font-weight="500" letter-spacing="0.4">
    JERRY JAMES
  </text>
</svg>
