<svg width="260" height="64" viewBox="0 0 260 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Jerry James Hardware Turbine Logo</title>
  <desc id="desc">A dynamic hardware turbine fan paired with the Jerry James premium wordmark.</desc>
  <defs>
    <!-- Background Frame Gradient -->
    <linearGradient id="nexus-logo-frame-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D4FF" stop-opacity="0.6"/>
      <stop offset="0.5" stop-color="#8F5CFF" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0.1"/>
    </linearGradient>
    
    <!-- Turbine Blade Gradient -->
    <linearGradient id="nexus-logo-ribbon-grad" x1="20" y1="50" x2="50" y2="14" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D4FF"/>
      <stop offset="0.6" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#8F5CFF"/>
    </linearGradient>

    <!-- Wordmark Accent Gradient -->
    <linearGradient id="nexus-logo-wordmark-grad" x1="140" y1="20" x2="220" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#8F5CFF"/>
    </linearGradient>

    <!-- Subtle Glow Filter -->
    <filter id="nexus-logo-glow" x="-10" y="-10" width="84" height="84" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.00   0 0 0 0 0.83   0 0 0 0 1.00   0 0 0 0.25 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>

    <!-- Single Aerodynamic Fan Blade Path definition -->
    <path id="blade" d="M32 25.5 C37 25.5 49 19.5 52 14.5 C55 21.5 46 32.5 37.5 34.5 C34.5 34.5 32 31.5 32 25.5 Z" fill="url(#nexus-logo-ribbon-grad)" />
  </defs>

  <!-- Premium Background Squircle -->
  <rect x="3" y="3" width="58" height="58" rx="16" fill="#07090C" stroke="url(#nexus-logo-frame-grad)" stroke-width="1.5" />
  
  <!-- Glowing Monogram Icon -->
  <g filter="url(#nexus-logo-glow)">
    <!-- Shroud Frame Ring -->
    <circle cx="32" cy="32" r="27" stroke="url(#nexus-logo-ribbon-grad)" stroke-width="2.5" fill="none" opacity="0.9" />
    <!-- Speed/Tachometer markings -->
    <circle cx="32" cy="32" r="23" stroke="#14B8A6" stroke-width="1.2" stroke-dasharray="2 3.5" fill="none" opacity="0.5" />

    <!-- 3 Symmetric Blades -->
    <use href="#blade" />
    <use href="#blade" transform="rotate(120 32 32)" />
    <use href="#blade" transform="rotate(240 32 32)" />

    <!-- Hub Assembly -->
    <circle cx="32" cy="32" r="7.5" fill="#07090C" stroke="#FFFFFF" stroke-width="1.5" />
    <circle cx="32" cy="32" r="2.8" fill="#00D4FF" />
  </g>

  <!-- Jerry James Wordmark -->
  <text x="76" y="35" font-family="Outfit, Geist, Inter, Segoe UI, sans-serif" font-size="22" font-weight="600" letter-spacing="-0.02em">
    <tspan fill="#FFFFFF">Jerry </tspan>
    <tspan fill="url(#nexus-logo-wordmark-grad)" font-weight="800">James</tspan>
  </text>
  
  <!-- Professional Subtitle -->
  <text x="77" y="49" fill="#8A92A6" font-family="Geist, Inter, Segoe UI, sans-serif" font-size="9.5" font-weight="600" letter-spacing="0.16em">TECHNICAL MARKETING</text>
</svg>
