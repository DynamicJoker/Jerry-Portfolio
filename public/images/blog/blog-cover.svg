  <polyline points="960,680 1090,630 1210,646 1340,560 1452,540" stroke="#57B9FF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1452 540 l-26 -4 m26 4 l-12 24" stroke="#57B9FF" stroke-width="6" stroke-linecap="round"/>
  <circle cx="1452" cy="540" r="20" fill="#90D5FF" opacity=".3" filter="url(#glow)"/>
  <circle cx="1452" cy="540" r="9" fill="#90D5FF"/>
