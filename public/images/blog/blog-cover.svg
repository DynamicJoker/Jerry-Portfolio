<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="55%" cy="48%" r="85%">
      <stop offset="0" stop-color="#0f1e29"/>
      <stop offset="1" stop-color="#0a141c"/>
    </radialGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#90D5FF"/>
      <stop offset="1" stop-color="#517891"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <!-- Tangled input: complex technology -->
  <g fill="none" stroke-linecap="round">
    <path d="M80 220 C 280 120 360 430 520 320 S 670 430 716 432" stroke="#517891" stroke-width="3.5" stroke-opacity=".75"/>
    <path d="M60 460 C 220 560 330 250 470 400 S 670 458 716 450" stroke="#3d5666" stroke-width="3" stroke-opacity=".9"/>
    <path d="M100 700 C 260 760 340 520 500 600 S 670 482 716 470" stroke="#517891" stroke-width="3.5" stroke-opacity=".6"/>
    <path d="M70 600 C 240 420 380 660 540 480 S 678 442 716 441"  stroke="#3d5666" stroke-width="2.5" stroke-opacity=".8"/>
    <path d="M120 330 C 300 300 320 560 540 430 S 678 468 716 460" stroke="#517891" stroke-width="2.5" stroke-opacity=".5"/>
  </g>
  <g fill="#517891">
    <circle cx="280" cy="208" r="8"/>
    <circle cx="330" cy="430" r="8"/>
    <circle cx="470" cy="400" r="8"/>
    <circle cx="500" cy="600" r="8"/>
    <circle cx="380" cy="560" r="7"/>
  </g>
  <!-- The lens -->
  <circle cx="800" cy="450" r="86" fill="#57B9FF" opacity=".14" filter="url(#glow)"/>
  <circle cx="800" cy="450" r="120" stroke="url(#lens)" stroke-width="6"/>
  <circle cx="800" cy="450" r="84" stroke="#57B9FF" stroke-opacity=".35" stroke-width="2.5"/>
  <!-- Clear output: ordered copy -->
  <rect x="960" y="318" width="356" height="17" rx="8.5" fill="#D6EFFF" fill-opacity=".92"/>
  <rect x="960" y="376" width="300" height="15" rx="7.5" fill="#77B1D4" fill-opacity=".65"/>
  <rect x="960" y="430" width="330" height="15" rx="7.5" fill="#77B1D4" fill-opacity=".65"/>
  <rect x="960" y="484" width="236" height="15" rx="7.5" fill="#77B1D4" fill-opacity=".65"/>
  <path d="M920 384 L958 384 M920 450 L958 450 M920 516 L956 510" stroke="#57B9FF" stroke-width="3" stroke-opacity=".5" stroke-linecap="round"/>
