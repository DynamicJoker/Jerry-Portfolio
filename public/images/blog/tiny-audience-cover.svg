  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <!-- Radar: the whole market -->
  <circle cx="600" cy="450" r="130" stroke="#57B9FF" stroke-opacity=".5" stroke-width="2.5"/>
  <circle cx="600" cy="450" r="240" stroke="#57B9FF" stroke-opacity=".3" stroke-width="2"/>
  <circle cx="600" cy="450" r="360" stroke="#517891" stroke-opacity=".34" stroke-width="2"/>
  <circle cx="600" cy="450" r="490" stroke="#517891" stroke-opacity=".16" stroke-width="2"/>
  <circle cx="600" cy="450" r="52" fill="#57B9FF" opacity=".32" filter="url(#glow)"/>
  <circle cx="600" cy="450" r="18" fill="#90D5FF"/>
  <!-- The broad audience: present but quiet -->
  <g fill="#3d5666">
    <circle cx="300" cy="240" r="7"/>
    <circle cx="430" cy="700" r="7"/>
    <circle cx="180" cy="520" r="6"/>
    <circle cx="760" cy="760" r="7"/>
